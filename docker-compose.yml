services:
  postgres:
    image: postgres:16
    container_name: pr-review-pg
    environment:
      POSTGRES_USER: pruser
      POSTGRES_PASSWORD: prpass
      POSTGRES_DB: prreview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pruser -d prreview"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
